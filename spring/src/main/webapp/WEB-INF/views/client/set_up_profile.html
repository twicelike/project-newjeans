<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create User</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-100">
<div class="bg-white p-6 rounded shadow-md w-1/3">
    <h2 class="text-xl font-bold mb-4">Create New User</h2>

    <form th:action="@{/register}" th:object="${user}" method="post" enctype="multipart/form-data">
        <label class="block">Name:</label>
        <input type="text" th:field="*{name}" class="border p-2 w-full mb-4" required>

        <label class="block">Email:</label>
        <input type="email" th:field="*{email}" class="border p-2 w-full mb-4" required>

        <label class="block">Password:</label>
        <input type="password" th:field="*{password}" class="border p-2 w-full mb-4" required>

        <label class="block">Phone Number:</label>
        <input type="text" th:field="*{phoneNumber}" class="border p-2 w-full mb-4">

        <label class="block">Gender:</label>
        <select th:field="*{gender}" class="border p-2 w-full mb-4">
            <option value="true">Male</option>
            <option value="false">Female</option>
        </select>

        <label class="block">Location:</label>
        <input type="text" th:field="*{location}" class="border p-2 w-full mb-4">

        <label class="block">Birthday:</label>
        <input type="date" th:field="*{birthday}" class="border p-2 w-full mb-4">

        <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-lg">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Upload up to 6 images</h2>

            <input type="file" id="imageInput" multiple name="images"
                   class="block w-full text-sm text-gray-500
                   file:mr-4 file:py-2 file:px-4
                   file:rounded-lg file:border-0
                   file:text-sm file:font-semibold
                   file:bg-blue-500 file:text-white
                   hover:file:bg-blue-600"
            />

            <p id="errorText" class="text-red-500 text-sm mt-2 hidden">You can upload a maximum of 6 images.</p>

            <div id="previewContainer" class="grid grid-cols-3 gap-2 mt-4"></div>
        </div>

        <script>
            const imageInput = document.getElementById("imageInput");
            const previewContainer = document.getElementById("previewContainer");
            const errorText = document.getElementById("errorText");

            let selectedFiles = [];

            imageInput.addEventListener("change", function (event) {
                const files = Array.from(event.target.files);

                if (selectedFiles.length + files.length > 6) {
                    errorText.classList.remove("hidden");
                    return;
                }

                errorText.classList.add("hidden");

                files.forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        const imgContainer = document.createElement("div");
                        imgContainer.className = "relative w-24 h-24";

                        const img = document.createElement("img");
                        img.src = e.target.result;
                        img.className = "w-full h-full object-cover rounded-md shadow";

                        const removeButton = document.createElement("button");
                        removeButton.className = "absolute top-0 right-0 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center";
                        removeButton.innerHTML = "✕";
                        removeButton.onclick = function () {
                            selectedFiles = selectedFiles.filter(f => f !== file);
                            imgContainer.remove();
                        };

                        imgContainer.appendChild(img);
                        imgContainer.appendChild(removeButton);
                        previewContainer.appendChild(imgContainer);
                        selectedFiles.push(file);
                    };
                    reader.readAsDataURL(file);
                });
            });
        </script>

        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded w-full">
            Create User
        </button>
    </form>
</div>
</body>
</html>
