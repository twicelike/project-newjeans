<!DOCTYPE html>
<html>
<head>
    <title>Answer Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        /* Style for dropdown profile */
        .profile-dropdown {
            display: none;
            position: absolute;
            right: 1rem;
            top: 3.5rem;
            background-color: white;
            min-width: 200px;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
            z-index: 1;
            border-radius: 4px;
        }

        .profile-dropdown a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .profile-dropdown a:hover {
            background-color: #f1f1f1;
        }

        .show {
            display: block;
        }

        /* Style for question types */
        .paragraph-answer {
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 8px;
            width: 100%;
            min-height: 100px;
            resize: vertical;
        }

        /* Style for answer form */
        .answer-form .question-title {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .answer-form .question-item {
            margin-bottom: 24px;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1rem;
            background-color: white;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 64px;
            height: 64px;
            object-fit: contain;
        }
    </style>
    <script type="module" src="/js/survey/answer.js"></script>
    <script th:inline="javascript">
        const userId = [[${userId}]];
    </script>
</head>
<body class="bg-purple-100">
<div class="flex justify-between items-center p-4 bg-white shadow relative">
    <div class="logo-container">
        <a href="#" class="bg-white p-1 rounded-full shadow">
            <img src="/images/home/logo-2.png" alt="Logo" class="logo-img">
        </a>
        <span id="answerFormTitle" class="text-lg font-semibold">Survey Answers</span>
    </div>
    <div class="flex items-center space-x-4">
        <!-- Profile section -->
        <div class="relative">
            <div id="profileBtn" class="flex items-center space-x-2 cursor-pointer">
                <img th:src="@{'/images/userImages/' + ${avatar}}" alt="Profile" class="rounded-full h-8 w-8">
                <span class="hidden md:inline" th:text="${username}"></span>
                <i class="fas fa-chevron-down text-gray-600 text-xs"></i>
            </div>
            <div id="profileDropdown" class="profile-dropdown">
                <a href="/profile"><i class="fas fa-user mr-2"></i> Profile</a>
                <a href="#"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
            </div>
        </div>
    </div>
</div>

<div class="flex justify-center mt-4">
    <div class="w-full max-w-4xl bg-white p-6 rounded shadow answer-form">
        <div class="border-b-2 border-purple-600 pb-2 mb-4">
            <h1 id="surveyTitle" class="text-2xl font-semibold"></h1>
        </div>

        <div id="answersContainer">
            <!-- Questions here -->

        </div>

        <div class="mt-6 flex justify-between">
            <button id="saveDraftBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-6 py-2 rounded transition">
                Save Draft
            </button>
            <button id="submitAnswersBtn"
                    class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded transition">
                Submit Answers
            </button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const submitBtn = document.getElementById('submitAnswersBtn');
        const saveDraftBtn = document.getElementById('saveDraftBtn');
        const answersContainer = document.getElementById('answersContainer');
        const surveyTitle = document.getElementById('surveyTitle');

        // Gắn tiêu đề tạm (đại đại rứa thôi 😄)
        // surveyTitle.textContent = "NewJeans Fan Survey 💜";

        // Xử lý nút Submit
        submitBtn.addEventListener('click', () => {
            // Giả lập lấy dữ liệu từ answersContainer
            const answers = [];
            const inputs = answersContainer.querySelectorAll('input, textarea, select');

            inputs.forEach(input => {
                answers.push({
                    name: input.name || '(no name)',
                    value: input.value || '(empty)'
                });
            });

            // Hiển thị “kết quả giả” ra console
            console.log("📦 Submitted answers:", answers);

            // Thông báo cho user
            alert("Your answers have been submitted successfully!\n(Just a demo, not sent to server 😄)");

            // Làm hiệu ứng giả là “đã gửi xong”
            submitBtn.disabled = true;
            submitBtn.textContent = "Submitted!";
            submitBtn.classList.add("bg-gray-400");
        });

        // Xử lý nút Save Draft
        saveDraftBtn.addEventListener('click', () => {
            alert("Draft saved (locally only, demo mode).");
        });
    });
</script>

</body>
</html>
