<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/auth/BGMoving.css">
    <link rel="stylesheet" href="/css/auth/SwitchingWindow.css">
    <link rel="stylesheet" href="/css/auth/Root.css">
    <script type="text/html" src="/js/auth/MoveToSetup.js"></script>
    <script type="module" src="/js/auth/register.js"></script>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
    </style>
</head>

<body>
<div class="fixed w-full h-full bg-[url('/images/auth/11283131.png')] animate-bg"></div>
<form
        th:action="@{/reset-password}"
        method="post"
        th:object="${password}"
        class="w-full h-screen flex flex-col items-center justify-center">
    <div
            class="flex flex-col justify-center items-center bg-black/75 z-10 rounded-lg  sm:w-4/5 md:w-3/5 lg:w-2/5 w-full p-2 h-auto py-5"
            id="restorePassrordForm">
        <div class="font-bold text-white text-xl mb-4 z-10 w-full ml-10">
            <div>Restore Password</div>
            <div id="messageBox"></div>
        </div>
        <input type="email" th:field="*{email}" class="rounded-lg max-w-sm w-full py-2 px-3 mx-auto" placeholder="Email"
               id="email">
        <input type="password" th:field="*{password}" class="rounded-lg max-w-sm w-full py-2 px-3 mt-4 mx-auto"
               id="newPassword"
               placeholder="New password">
        <input type="password" th:field="*{confirmPassword}" class="rounded-lg max-w-sm w-full py-2 px-3 mt-4 mx-auto"
               id="confirmationPassword"
               placeholder="Confirmation password">
        <div class="rounded-lg max-w-sm w-full p-2 mt-2 flex justify-center items-center">
            <div class="rounded-lg bg-white">
                <input class="rounded-lg p-2" th:field="*{otp}" type="text" placeholder="OTP">
            </div>
            <button type="button" id="sendOtpBtn" class="mt-2 px-4 py-2 bg-blue-500 text-white rounded">Send OTP
            </button>
        </div>
        <div class="z-10 mt-4 w-full flex justify-between">
            <a href="/login" class="hover:scale-110 active:scale-100 w-20 h-10 rounded-lg">
                <img src="/images/auth/backbutton.png" alt="Next" class="w-20 h-10 rounded-lg">
            </a>
            <div class="hover:scale-110 active:scale-100 w-20 h-10 rounded-lg">
                <input type="image" alt="button image" src="/images/auth/nextbutton.png"
                       class="hover:scale-110 active:scale-100 w-20 h-10 rounded-lg" id="submitSignUpButton">
            </div>
        </div>
    </div>
</form>
</body>

</html>
