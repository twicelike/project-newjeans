<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/auth/BGMoving.css">
    <link rel="stylesheet" href="/css/auth/SwitchingWindow.css">
    <link rel="stylesheet" href="/css/auth/Root.css">

</head>

<body class="overflow-hidden">
<div class="fixed top-0 left-0 w-screen h-screen bg-[url('/images/auth/11283131.png')] animate-bg"></div>

<!-- //Form đăng nhập  -->
<form th:action="@{/login}" method="post" class="w-screen h-screen flex flex-col items-center justify-center">
    <div class="flex flex-col justify-center items-center bg-black/75 z-10 rounded-lg  sm:w-4/5 md:w-3/5 lg:w-2/5 w-full  h-auto py-5"
         id="signInForm">
        <div class="font-bold text-white text-xl mb-4 z-10 w-full ml-10">
            <div>Sign In</div>
        </div>

        <div th:if="${param.error}" class="text-red-500 mt-2">
            Failed, please try again.
        </div>

        <div th:if="${param.expired}" class="text-red-500 mt-2">
            Please login again
        </div>

        <div th:if="${param.error}" class="text-red-500 mt-2">
            Failed, please try again.
        </div>

        <input type="email" name="username" class="rounded-lg max-w-sm w-full py-2 px-3 ml-4" placeholder="Email"
               id="email">
        <input type="password" name="password" class="rounded-lg max-w-sm w-full py-2 px-3 mt-4 ml-4" id="password"
               placeholder="Password">

        <div class="flex items-center justify-start w-full max-w-sm mt-4 ml-4 md:items-center md:justify-center mb-2">
            <input type="checkbox" id="remember-me" name="remember-me" class="mr-2 w-4 h-4">
            <label for="remember-me" class="text-white">Remember me</label>
        </div>

        <div class="relative md:flex ml-3 md:items-center md:justify-center">
            <p class="text-[--primary-color] italic">don't have an account? </p>
            <a href="/register" class="text-green-400 italic" id="signUp"> Sign up</a>
        </div>

        <div class="relative md:flex ml-3 md:items-center md:justify-center">
            <a href="/reset-password" class="text-green-400  hover:underline italic">Restore password </a>
        </div>

        <div class="z-10 mt-4 w-full mr-10 flex justify-between flex-row-reverse">
            <input type="image" value="Next" src="/images/auth/nextbutton.png"
                   class="hover:scale-110 active:scale-100 w-20 h-10 rounded-lg"
                   id="submitSignInButton">
        </div>
    </div>
</form>

</body>

</html>
