<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/auth/BGMoving.css">
    <link rel="stylesheet" href="/css/auth/SwitchingWindow.css">
    <link rel="stylesheet" href="/css/auth/Root.css">
    <script type="text/html" src="/js/auth/MoveToSetup.js"></script>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
    </style>
</head>

<body>

<div class="fixed w-full h-full bg-[url('/images/auth/11283131.png')] animate-bg"></div>
<div class="w-full h-screen flex flex-col items-center justify-center">
    <div
            class="flex flex-col justify-center items-center bg-black/75 z-10 rounded-lg  sm:w-4/5 md:w-3/5 lg:w-2/5 w-full p-2 h-auto py-5"
            id="restorePassrordForm">
        <div class="font-bold text-white text-xl mb-4 z-10 w-full ml-10">
            <div>Password restore failed.</div>
            <div th:if="${error}" class="text-red-600 text-sm mt-2">
                <p th:text="${error}"></p>
            </div>
            <div class="z-10 mt-4 w-full flex justify-between">
                <a href="/reset-password">
                    <img src="/images/auth/backbutton.png" alt="Return"
                         class="hover:scale-110 active:scale-100 w-20 h-10 rounded-lg" />
                </a>
            </div>
        </div>
    </div>

</div>
</body>

</html>
