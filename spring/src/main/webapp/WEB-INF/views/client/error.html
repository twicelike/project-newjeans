<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- GOOGLE FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Rubik:wght@400;600&display=swap"
          rel="stylesheet">

    <!-- TAILWIND CONFIG -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        monoton: ['Monoton', 'cursive'],
                        rubik: ['Rubik', 'sans-serif'],
                    },
                    dropShadow: {
                        'glow': '0 0 20px rgba(255, 255, 255, 0.8)',
                    }
                }
            }
        }
    </script>
</head>

<body class="m-0 p-0 h-screen flex flex-col justify-center items-center text-center bg-cover bg-center font-rubik"
      style="background-image: url('/images/error/img.jpg')">
<!-- 404 -->
<h1 class="text-[180px] font-monoton text-pink-500 drop-shadow-glow animate-pulse">
    404
</h1>

<!-- Page not found -->
<p class="text-[48px] mb-12 text-yellow-300 drop-shadow-[0_5px_5px_rgba(0,0,0,0.6)] font-rubik">
    Page not found
</p>

<!-- Home button -->
<a href="/"
   class="px-10 py-5 text-2xl font-semibold rounded-xl text-white bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 shadow-lg hover:from-purple-600 hover:to-indigo-600 transition duration-300 transform hover:scale-110">
    Home
</a>
</body>

</html>
