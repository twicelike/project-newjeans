<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>NewJeans Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pastel gradient in NewJeans colors */
        .nj-gradient {
            background: linear-gradient(135deg,
            #FFC1CC 0%,
                /* soft pink */ #B2EBF2 50%,
                /* light cyan */ #FFEFA3 100% /* pale yellow */
            );
        }
    </style>
</head>

<body class="min-h-screen nj-gradient flex items-center justify-center p-4">
<div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-xl max-w-md w-full p-6">
    <h1 class="text-3xl font-extrabold text-indigo-600 mb-4 text-center">💌 Feedback</h1>
    <p class="text-gray-700 mb-6 text-center">
        Tell us what you think!
        <span class="text-indigo-500 font-semibold">Your voice matters.</span>
    </p>

    <form id="feedbackForm" th:action="@{/feedback}" th:object="${feedbackDTO}" method="post" class="space-y-4">
        <!-- Email field -->
        <div>
            <label for="email" class="block text-sm font-medium text-gray-800 mb-1">Email</label>
            <input type="email" th:field="*{email}" id="email" placeholder="you@example.com" required
                   class="w-full px-4 py-2 border-2 border-indigo-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"/>
        </div>

        <!-- Content field -->
        <div>
            <label for="content" class="block text-sm font-medium text-gray-800 mb-1">Your Feedback</label>
            <textarea th:field="*{content}" id="content" rows="5" placeholder="Tell us your thoughts…" required
                      class="w-full px-4 py-2 border-2 border-indigo-200 rounded-lg resize-y focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"></textarea>
        </div>

        <!-- Submit button -->
        <div class="text-center">
            <button type="submit"
                    class="inline-flex items-center px-6 py-2 bg-indigo-600 text-white font-bold rounded-full shadow hover:bg-indigo-700 transition">
                Send Feedback
            </button>
        </div>
    </form>
</div>
<script>
    document
        .getElementById('feedbackForm')
        .addEventListener('submit', function (e) {
            // Optionally prevent the actual submit to test the alert:
            // e.preventDefault();

            alert('Thank you! Your feedback has been submitted.');
            // The form will then submit as normal, unless you called e.preventDefault()
        });
</script>
</body>

</html>
