<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white shadow-md rounded-lg p-8 w-96 text-center">
    <h2 class="text-2xl font-bold mb-6">Login</h2>

    <form th:action="@{/create-user}" method="post" th:object="${user}"
          class="max-w-sm mx-auto bg-white p-6 rounded-lg shadow-md">
        <button type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition duration-300">
            Log in
        </button>
    </form>

</div>

<br/>

<form th:action="@{/test-send-mail}" method="post">
    <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded">Let's go</button>
</form>

</body>
</html>
