<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-blue-600 text-white flex flex-col p-4">
        <h2 class="text-xl font-semibold mb-6">Admin Panel</h2>
        <nav>
            <ul>
                <li class="mb-2">
                    <button onclick="showContent('hobbyTag')" class="w-full text-left p-2 rounded-lg hover:bg-blue-500">
                        HobbyTag
                    </button>
                </li>
                <li class="mb-2">
                    <button onclick="showContent('user')" class="w-full text-left p-2 rounded-lg hover:bg-blue-500">
                        User
                    </button>
                </li>
                <li class="mb-2">
                    <button onclick="showContent('post')" class="w-full text-left p-2 rounded-lg hover:bg-blue-500">
                        Post
                    </button>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-6">
        <div id="hobbyTag" class="content-section">
            <h2 class="text-2xl font-semibold">HobbyTag Management</h2>
            <p class="mt-4">This is the HobbyTag management section.</p>
        </div>
        <div id="user" class="content-section hidden">
            <h2 class="text-2xl font-semibold">User Management</h2>
            <p class="mt-4">This is the User management section.</p>
        </div>
        <div id="post" class="content-section hidden">
            <h2 class="text-2xl font-semibold">Post Management</h2>
            <p class="mt-4">This is the Post management section.</p>
        </div>
    </div>
</div>

<script>
    function showContent(section) {
        document.querySelectorAll('.content-section').forEach(div => {
            div.classList.add('hidden');
        });
        document.getElementById(section).classList.remove('hidden');
    }
</script>
</body>
</html>
