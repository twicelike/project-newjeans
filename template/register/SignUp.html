<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/BGMoving.css">
  <link rel="stylesheet" href="./css/SwitchingWindow.css">
  <link rel="stylesheet" href="./css/Root.css">

</head>

<body class="overflow-hidden">
  <div class="fixed top-0 left-0 w-screen h-screen bg-[url('/template/register/img/11283131.png')] animate-bg"></div>

  <div class="w-screen h-screen flex flex-col items-center justify-center">

    <!-- Form Đăng ký -->
    <div
      class="flex flex-col justify-center items-center bg-black/75 z-10 rounded-lg sm:w-4/5 md:w-3/5 lg:w-2/5 w-full h-auto py-5"
      id="signUpForm">
      <div class="font-bold text-white text-xl mb-4 z-10 w-full ml-10">
        <div>Sign up</div>
      </div>
      <form action="" method="post" class="flex flex-col justify-center items-center w-full h-auto">
      <input type="email" class="rounded-lg max-w-sm w-full py-2 px-3 ml-4" placeholder="Email" id="email">
      <input type="password" class="rounded-lg max-w-sm w-full py-2 px-3 mt-4 ml-4" id="password"
        placeholder="Password">
      <input type="password" class="rounded-lg max-w-sm w-full p-2 mt-4 ml-4" id="re-password"
        placeholder="Re-enter the password">
      </form>
      <div class="rounded-lg max-w-sm w-full p-2 mt-2 flex justify-center items-center">
        <div class="rounded-lg bg-white">
          <form action="" method="post">
          <input class="rounded-lg p-2" type="text" placeholder="OTP" id="OTP">
          <button type="button" class="p-2" onclick="document.getElementById('Re-send')">
            <span id="Re-send">Re-send</span>
          </button>
          </form>
        </div>
      </div>
      <div class="relative md:flex ml-3 md:items-center md:justify-center">
        <p class="text-[--primary-color] italic">already have an account? </p>
        <a href="./SignIn.html" class="text-green-400 italic" id="signIn"> Sign in</a>
      </div>
      <div class="z-10 mt-2 mr-10 w-full flex justify-between flex-row-reverse">
        <input type="image" alt="button image" src="./img/nextbutton.png"
          class="hover:scale-110 active:scale-100 w-20 h-10 rounded-lg" id="submitSignUpButton">
      </div>
    </div>


  </div>
  <script src="./js/MoveToSetup.js"></script>
</body>

</html>
