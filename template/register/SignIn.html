<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/BGMoving.css">
  <link rel="stylesheet" href="./css/SwitchingWindow.css">
  <link rel="stylesheet" href="./css/Root.css">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
  </style>
</head>

<body>
  <div class="fixed top-0 left-0 w-full h-full bg-[url('/template/register/img/11283131.png')] animate-bg"></div>
  <form method="post" action="" class="w-full h-screen flex flex-col items-center justify-center">
    <div class="flex flex-col justify-center items-center bg-black/75 z-10 rounded-lg  sm:w-4/5 md:w-3/5 lg:w-2/5 w-full p-2 h-auto py-5"
      id="signInForm">
        <div class="font-bold text-white text-xl mb-4 z-10 w-full ml-10">
        <div>Sign In</div>
      </div>
      <input type="email" class="rounded-lg max-w-sm w-full py-2 px-3 mx-auto" placeholder="Email" id="email">
      <input type="password" class="rounded-lg max-w-sm w-full py-2 px-3 mt-4 mx-auto" id="password"
        placeholder="Password">
      <div class="rounded-lg max-w-sm w-full p-2 mt-2 flex justify-center items-center">
        <div class="rounded-lg bg-white">
          <input class="rounded-lg p-2" type="text" placeholder="OTP">
          <button class="p-2" onclick="document.getElementById('Re-send')">
            <span id="Re-send">Re-send</span>
          </button>
        </div>
      </div>
      <div class="relative md:flex ml-3 md:items-center md:justify-center break-keep">
        <p class="text-[--primary-color] italic">don't have an account?
        <a href="./SignUp.html" class="text-green-400 italic hover:underline" id="signUp"> Sign up</a></p>
      </div>
      <div class="relative md:flex ml-3 md:items-center md:justify-center">
        <a href="#" class="text-green-400  hover:underline italic">Restore password </a>
      </div>
    <div class="z-10 mt-4 w-full mr-10 flex justify-between flex-row-reverse">
      <input type="image" value="Next" src="./img/nextbutton.png" class="hover:scale-110 active:scale-100 w-20 h-10 rounded-lg"
        id="submitSignInButton">
    </div>
    </div>

  </form>

</body>

</html>
