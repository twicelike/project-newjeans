<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/BGMoving.css">

  <link rel="stylesheet" href="./css/Root.css">
</head>

<body class="overflow-hidden">
 
  <div class="fixed w-full h-full bg-[url('/template/register/img/11283131.png')] animate-bg"></div>
  <form method="post" action="" class="flex justify-center w-screen h-screen items-center" id="setUpProfileForm">
    <div
      class="flex-col flex rounded-lg bg-black/75 sm:w-4/5 md:w-3/5 lg:w-2/5 w-full h-auto backdrop-blur-sm items-center"
      id="setUpBasicInfo">
      <div class="flex font-bold text-white text-xl my-4 ml-10 w-full">Basic Information</div>
      <div class="flex space-x-1 w-4/5">
        <input type="text" class="rounded-lg w-full h-8 py-1 px-2 mt-3" placeholder="First name">
        <input type="text" class="rounded-lg w-full h-8 py-1 px-2 mt-3" placeholder="Last name">
      </div>
      <div class="w-4/5 flex space-x-1">
        <input type="text" class="rounded-lg h-8 py-1 px-2 mt-2 w-4/5" placeholder="Username">
        <select class="rounded-lg h-8 py-1 px-2 mt-2 w-1/5" name="gender" id="gender">
          <option value="">-Gender-</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>
      <select class="rounded-md w-4/5 h-8 mt-2" name="address" id="address" placeholder="address">
        <option value="">-Location-</option>
        <option value="An Giang">An Giang</option>
        <option value="Bà Rịa - Vũng Tàu">Bà Rịa - Vũng Tàu</option>
        <option value="Bắc Giang">Bắc Giang</option>
        <option value="Bắc Kạn">Bắc Kạn</option>
        <option value="Bạc Liêu">Bạc Liêu</option>
        <option value="Bắc Ninh">Bắc Ninh</option>
        <option value="Bến Tre">Bến Tre</option>
        <option value="Bình Định">Bình Định</option>
        <option value="Bình Dương">Bình Dương</option>
        <option value="Bình Phước">Bình Phước</option>
        <option value="Bình Thuận">Bình Thuận</option>
        <option value="Cà Mau">Cà Mau</option>
        <option value="Cần Thơ">Cần Thơ</option>
        <option value="Cao Bằng">Cao Bằng</option>
        <option value="Đà Nẵng">Đà Nẵng</option>
        <option value="Đắk Lắk">Đắk Lắk</option>
        <option value="Đắk Nông">Đắk Nông</option>
        <option value="Điện Biên">Điện Biên</option>
        <option value="Đồng Nai">Đồng Nai</option>
        <option value="Đồng Tháp">Đồng Tháp</option>
        <option value="Gia Lai">Gia Lai</option>
        <option value="Hà Giang">Hà Giang</option>
        <option value="Hà Nam">Hà Nam</option>
        <option value="Hà Nội">Hà Nội</option>
        <option value="Hà Tĩnh">Hà Tĩnh</option>
        <option value="Hải Dương">Hải Dương</option>
        <option value="Hải Phòng">Hải Phòng</option>
        <option value="Hậu Giang">Hậu Giang</option>
        <option value="Hòa Bình">Hòa Bình</option>
        <option value="Hưng Yên">Hưng Yên</option>
        <option value="Khánh Hòa">Khánh Hòa</option>
        <option value="Kiên Giang">Kiên Giang</option>
        <option value="Kon Tum">Kon Tum</option>
        <option value="Lai Châu">Lai Châu</option>
        <option value="Lâm Đồng">Lâm Đồng</option>
        <option value="Lạng Sơn">Lạng Sơn</option>
        <option value="Lào Cai">Lào Cai</option>
        <option value="Long An">Long An</option>
        <option value="Nam Định">Nam Định</option>
        <option value="Nghệ An">Nghệ An</option>
        <option value="Ninh Bình">Ninh Bình</option>
        <option value="Ninh Thuận">Ninh Thuận</option>
        <option value="Phú Thọ">Phú Thọ</option>
        <option value="Phú Yên">Phú Yên</option>
        <option value="Quảng Bình">Quảng Bình</option>
        <option value="Quảng Nam">Quảng Nam</option>
        <option value="Quảng Ngãi">Quảng Ngãi</option>
        <option value="Quảng Ninh">Quảng Ninh</option>
        <option value="Quảng Trị">Quảng Trị</option>
        <option value="Sóc Trăng">Sóc Trăng</option>
        <option value="Sơn La">Sơn La</option>
        <option value="Tây Ninh">Tây Ninh</option>
        <option value="Thái Bình">Thái Bình</option>
        <option value="Thái Nguyên">Thái Nguyên</option>
        <option value="Thanh Hóa">Thanh Hóa</option>
        <option value="Thừa Thiên Huế">Thừa Thiên Huế</option>
        <option value="Tiền Giang">Tiền Giang</option>
        <option value="TP Hồ Chí Minh">TP Hồ Chí Minh</option>
        <option value="Trà Vinh">Trà Vinh</option>
        <option value="Tuyên Quang">Tuyên Quang</option>
        <option value="Vĩnh Long">Vĩnh Long</option>
        <option value="Vĩnh Phúc">Vĩnh Phúc</option>
        <option value="Yên Bái">Yên Bái</option>
      </select>
      <select class="rounded-md w-4/5 h-8 mt-2" name="edu-level" id="edu-level" placeholder="edu-level">
        <option value="">-Education level-</option>
        <option value="High school">High school</option>
        <option value="College">College</option>
        <option value="University">University</option>
        <option value="Master">Master</option>
        <option value="Doctor">Doctor</option>
      </select>
      <div class="my-3 w-4/5">
        <label for="userAge" class="block text-sm text-[--primary-color] mb-1 text-center">Age: <span
            id="ageValue">18</span></label>
        <div class="flex items-center">
          <input type="range" id="userAge" name="age" min="18" max="99"
            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" value="18"
            oninput="document.getElementById('ageValue').textContent = this.value">
        </div>
      </div>
      <div class="flex justify-end mr-10 w-full mb-4">
        <img src="./img/nextbutton.png" alt="button image"
          class="hover:scale-110 active:scale-100 rounded-lg w-20 h-10" id="nextImagesSetup">
      </div>
    </div>
    <div class="relative hidden" id="addImages">
      <div class="rounded-xl p-6 bg-black/75 backdrop-blur-sm">
        <div class="relative flex font-bold text-white text-xl mb-4">Your Pictures</div>
        <div class="grid md:grid-cols-3 grid-cols-2 gap-4" id="pictureContainer">
          <label 
            class="p-10 aspect-square border-2 border-dashed rounded-lg flex items-center
             justify-center cursor-pointer hover:bg-gray-50 transition-colors w-[200px] h-[200px] uploadLabel">
            <input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(this)">
            <span class="text-4xl text-gray-400">+</span>
          </label>
          <label 
            class="p-10 aspect-square border-2 border-dashed rounded-lg flex items-center
             justify-center cursor-pointer hover:bg-gray-50 transition-colors w-[200px] h-[200px] uploadLabel">
            <input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(this)">
            <span class="text-4xl text-gray-400">+</span>
          </label>
          <label 
            class="p-10 aspect-square border-2 border-dashed rounded-lg flex items-center
             justify-center cursor-pointer hover:bg-gray-50 transition-colors w-[200px] h-[200px] uploadLabel">
            <input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(this)">
            <span class="text-4xl text-gray-400">+</span>
          </label>
          <label 
            class="p-10 aspect-square border-2 border-dashed rounded-lg flex items-center
             justify-center cursor-pointer hover:bg-gray-50 transition-colors w-[200px] h-[200px] uploadLabel">
            <input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(this)">
            <span class="text-4xl text-gray-400">+</span>
          </label>
          <label 
            class="p-10 aspect-square border-2 border-dashed rounded-lg flex items-center
             justify-center cursor-pointer hover:bg-gray-50 transition-colors w-[200px] h-[200px] uploadLabel">
            <input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(this)">
            <span class="text-4xl text-gray-400">+</span>
          </label>
          <label 
            class="p-10 aspect-square border-2 border-dashed rounded-lg flex items-center
             justify-center cursor-pointer hover:bg-gray-50 transition-colors w-[200px] h-[200px] uploadLabel">
            <input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(this)">
            <span class="text-4xl text-gray-400">+</span>
          </label>
        </div>
        <div class="relative flex justify-between mt-4 space-x-2 w-full">
          <img src="./img/backbutton.png" alt="button image"
            class="hover:scale-110 active:scale-100 rounded-lg h-10 w-20" id="backSetup">
          <img src="./img/nextbutton.png" alt="button image"
            class="hover:scale-110 active:scale-100 rounded-lg h-10 w-20" id="nextHobbiesSetup">
        </div>

      </div>
    </div>
    <div
      class="flex-col flex p-5 rounded-lg bg-black/75 sm:w-4/5 md:w-3/5 lg:w-2/5 w-full h-auto backdrop-blur-sm items-center hidden "
      id="addHobbies">
      <div class="font-bold mb-4 text-white w-full">Interests/Hobbies</div>

      <div class="flex flex-wrap gap-2 mb-4 w-4/5 justify-center min-h-[40px] p-2 bg-white/10 rounded-lg"
        id="setupSelectedTags">
      </div>

      <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
        <button type="button"
          class="interest-btn text-[--primary-color] hover:text-[--secondary-color] flex items-center gap-2 px-4 py-2 rounded-lg border-2 border-purple-200 hover:bg-purple-100 transition-all backdrop-blur-sm"
          data-emoji="🎵" data-interest="Music">
          <span class="text-xl">🎵</span>
          <span>Music</span>
        </button>
        <button type="button"
          class="interest-btn text-[--primary-color] hover:text-[--secondary-color] flex items-center gap-2 px-4 py-2 rounded-lg border-2 border-purple-200 hover:bg-purple-100 transition-all"
          data-emoji="🎮" data-interest="Gaming">
          <span class="text-xl">🎮</span>
          <span>Gaming</span>
        </button>
        <button type="button"
          class="interest-btn text-[--primary-color] hover:text-[--secondary-color] flex items-center gap-2 px-4 py-2 rounded-lg border-2 border-purple-200 hover:bg-purple-100 transition-all"
          data-emoji="📚" data-interest="Reading">
          <span class="text-xl">📚</span>
          <span>Reading</span>
        </button>
        <button type="button"
          class="interest-btn text-[--primary-color] hover:text-[--secondary-color] flex items-center gap-2 px-4 py-2 rounded-lg border-2 border-purple-200 hover:bg-purple-100 transition-all"
          data-emoji="✈️" data-interest="Travel">
          <span class="text-xl">✈️</span>
          <span>Travel</span>
        </button>
        <button type="button"
          class="interest-btn text-[--primary-color] hover:text-[--secondary-color] flex items-center gap-2 px-4 py-2 rounded-lg border-2 border-purple-200 hover:bg-purple-100 transition-all"
          data-emoji="🏋️‍♂️" data-interest="Sports">
          <span class="text-xl">🏋️‍♂️</span>
          <span>Sports</span>
        </button>
        <button type="button"
          class="interest-btn text-[--primary-color] hover:text-[--secondary-color] flex items-center gap-2 px-4 py-2 rounded-lg border-2 border-purple-200 hover:bg-purple-100 transition-all"
          data-emoji="🍳" data-interest="Cooking">
          <span class="text-xl">🍳</span>
          <span>Cooking</span>
        </button>
        <button type="button"
          class="interest-btn text-[--primary-color] hover:text-[--secondary-color]  flex items-center gap-2 px-4 py-2 rounded-lg border-2 border-purple-200 hover:bg-purple-100 transition-all"
          data-emoji="📸" data-interest="Photography">
          <span class="text-xl">📸</span>
          <span>Photography</span>
        </button>
        <button type="button"
          class="interest-btn text-[--primary-color] hover:text-[--secondary-color] flex items-center gap-2 px-4 py-2 rounded-lg border-2 border-purple-200 hover:bg-purple-100 transition-all"
          data-emoji="🎨" data-interest="Art">
          <span class="text-xl">🎨</span>
          <span>Art</span>
          <div>

          </div>
      </div>
      <div class="flex justify-between mt-4 space-x-2 w-full">
        <img alt="button image" src="./img/backbutton.png"
          class="hover:scale-110 active:scale-100 rounded-lg h-10 w-20" id="backImagesSetup">
        <input type="image" src="./img/nextbutton.png" class="hover:scale-110 active:scale-100 rounded-lg h-10 w-20"
          id="submitButton">
      </div>
    </div>
  </form>

</body>
