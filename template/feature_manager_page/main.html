<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hoppy Tags</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="main.js" defer></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #f9f9f9;
      min-width: 160px;
      box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
      z-index: 1;
      border-radius: 4px;
      left: 1.5rem;
      top: 5rem;
    }
    .dropdown-content a {
      color: #333;
      padding: 10px 16px;
      text-decoration: none;
      display: block;
      font-size: 14px;
    }
    .dropdown-content a:hover {
      background-color: #f1f1f1;
    }
    .show {
      display: block;
    }
    .hover-row:hover {
      background-color: #f8fafc;
    }
    #editModal, #inviteModal {
      z-index: 100;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <div class="bg-gray-800 text-white w-64 p-6 relative">
      <div class="flex items-center mb-8 cursor-pointer group" id="profileDropdownBtn">
        <img src="https://placehold.co/50x50" alt="Profile" class="rounded-full mr-4">
        <div>
          <h2 class="text-lg font-semibold group-hover:text-blue-300 transition">DatPhan</h2>
          <p class="text-xs text-gray-400">Free Plan</p>
        </div>
        <i class="fas fa-chevron-down ml-auto text-gray-400 text-xs group-hover:text-white transition"></i>
      </div>
      
      <!-- Profile Dropdown -->
      <div id="profileDropdown" class="dropdown-content">
        <a href="#" class="hover:bg-gray-100"><i class="fas fa-user mr-2 text-gray-600"></i> Profile</a>
        <a href="#" class="hover:bg-gray-100"><i class="fas fa-cog mr-2 text-gray-600"></i> Settings</a>
        <a href="#" class="hover:bg-gray-100 text-red-500" id="logoutBtn"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
      </div>

      <nav>
        <h3 class="text-gray-400 uppercase text-xs mb-2">Tasks</h3>
        <ul class="mb-6">
          <li class="mb-2">
            <a href="#" class="flex items-center text-gray-400 hover:text-blue-300 transition" onclick="showSection('tasks')">
              <i class="fas fa-tasks mr-2"></i> Hoppy Tags
            </a>
          </li>
          <li class="mb-2">
            <a href="#" class="flex items-center text-gray-400 hover:text-blue-300 transition" onclick="showSection('team')">
              <i class="fas fa-users mr-2"></i> Team
            </a>
          </li>
        </ul>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-6">
      <!-- Hoppy Tags Section -->
      <div id="tasks-section">
        <div class="container mx-auto bg-white p-6 rounded shadow">
          <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-semibold">Hoppy Tags</h1>
            <div class="flex items-center">
              <a href="create-tag.html" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded transition flex items-center">
                <i class="fas fa-plus mr-2"></i> Create Hoppy Tag
              </a>
            </div>
          </div>

          <!-- Table -->
          <table class="min-w-full bg-white border">
            <thead>
              <tr class="bg-gray-50">
                <th class="py-3 px-4 border text-left">ID</th>
                <th class="py-3 px-4 border text-left">Name</th>
                <th class="py-3 px-4 border text-left">Icon</th>
                <th class="py-3 px-4 border text-left">Actions</th>
              </tr>
            </thead>
            <tbody id="productTableBody">
              <!-- Data will be loaded by JavaScript -->
            </tbody>
          </table>
        </div>
      </div>
      
      <!-- Team Section -->
      <div id="team-section" class="hidden">
        <div class="container mx-auto bg-white p-6 rounded shadow">
          <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-semibold">Team Members</h1>
            <button onclick="openInviteModal()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded transition flex items-center">
              <i class="fas fa-user-plus mr-2"></i> Invite Member
            </button>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="teamMembersContainer">
            <!-- Team members will be loaded here -->
          </div>

          <!-- Pending Invitations -->
          <div class="mt-8" id="pendingInvitationsContainer">
            <h2 class="text-lg font-semibold mb-3">Pending Invitations</h2>
            <div class="bg-gray-50 p-4 rounded-lg">
              <!-- Pending invitations will be loaded here -->
              <p class="text-gray-500 text-center">No pending invitations</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Tag Modal -->
  <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center hidden">
    <div class="bg-white p-6 rounded shadow w-full max-w-md">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-semibold">Edit Hoppy Tag</h3>
        <button onclick="closeEditModal()" class="text-gray-500 hover:text-gray-700">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <form id="editTagForm" class="space-y-4">
        <input type="hidden" id="editTagId">
        <div>
          <label for="editTagName" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
          <input type="text" id="editTagName" name="editTagName" 
                 class="w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" 
                 placeholder="Enter tag name" required>
        </div>
        
        <div>
          <label for="editTagIcon" class="block text-sm font-medium text-gray-700 mb-1">Icon URL</label>
          <input type="text" id="editTagIcon" name="editTagIcon" 
                 class="w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" 
                 placeholder="Enter icon URL" required>
        </div>
        
        <div class="flex justify-end space-x-3 pt-4">
          <button type="button" onclick="closeEditModal()" 
                  class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Cancel
          </button>
          <button type="submit" 
                  class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Update Tag
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Invite Member Modal -->
  <div id="inviteModal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center hidden">
    <div class="bg-white p-6 rounded shadow w-full max-w-md">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-semibold">Invite Team Member</h3>
        <button onclick="closeInviteModal()" class="text-gray-500 hover:text-gray-700">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <form id="inviteForm" class="space-y-4">
        <div>
          <label for="inviteEmail" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" id="inviteEmail" name="inviteEmail" 
                 class="w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" 
                 placeholder="Enter email address" required>
        </div>
        
        <div>
          <label for="inviteRole" class="block text-sm font-medium text-gray-700 mb-1">Role</label>
          <select id="inviteRole" name="inviteRole" 
                 class="w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" required>
            <option value="">Select Role</option>
            <option value="admin">Admin</option>
            <option value="member" selected>Member</option>
          </select>
        </div>
        
        <div class="flex justify-end space-x-3 pt-4">
          <button type="button" onclick="closeInviteModal()" 
                  class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Cancel
          </button>
          <button type="submit" 
                  class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Send Invitation
          </button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
