<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hoppy Tags</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #f9f9f9;
      min-width: 160px;
      box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
      z-index: 1;
      border-radius: 4px;
      left: 1.5rem;
      top: 5rem;
    }
    .dropdown-content a {
      color: #333;
      padding: 10px 16px;
      text-decoration: none;
      display: block;
      font-size: 14px;
    }
    .dropdown-content a:hover {
      background-color: #f1f1f1;
    }
    .show {
      display: block;
    }
    .hover-row:hover {
      background-color: #f8fafc;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <div class="bg-gray-800 text-white w-64 p-6 relative">
      <div class="flex items-center mb-8 cursor-pointer group" id="profileDropdownBtn">
        <img src="https://placehold.co/50x50" alt="Profile" class="rounded-full mr-4">
        <div>
          <h2 class="text-lg font-semibold group-hover:text-blue-300 transition">DatPhan</h2>
          <p class="text-xs text-gray-400">Free Plan</p>
        </div>
        <i class="fas fa-chevron-down ml-auto text-gray-400 text-xs group-hover:text-white transition"></i>
      </div>
      
      <!-- Profile Dropdown -->
      <div id="profileDropdown" class="dropdown-content">
        <a href="#" class="hover:bg-gray-100"><i class="fas fa-user mr-2 text-gray-600"></i> Profile</a>
        <a href="#" class="hover:bg-gray-100"><i class="fas fa-cog mr-2 text-gray-600"></i> Settings</a>
        <a href="#" class="hover:bg-gray-100 text-red-500" id="logoutBtn"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
      </div>

      <nav>
        <h3 class="text-gray-400 uppercase text-xs mb-2">Tasks</h3>
        <ul class="mb-6">
          <li class="mb-2">
            <a href="#" class="flex items-center text-gray-400 hover:text-blue-300 transition" onclick="showSection('tasks')">
              <i class="fas fa-tasks mr-2"></i> Hoppy Tags
            </a>
          </li>
          <li class="mb-2">
            <a href="#" class="flex items-center text-gray-400 hover:text-blue-300 transition" onclick="showSection('team')">
              <i class="fas fa-users mr-2"></i> Team
            </a>
          </li>
        </ul>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-6">
      <!-- Hoppy Tags Section -->
      <div id="tasks-section">
        <div class="container mx-auto bg-white p-6 rounded shadow">
          <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-semibold">Hoppy Tags</h1>
            <div class="flex items-center">
              <a href="create.html" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded transition flex items-center">
                <i class="fas fa-plus mr-2"></i> Create Hoppy Tag
              </a>
            </div>
          </div>

          <!-- Table -->
          <table class="min-w-full bg-white border">
            <thead>
              <tr class="bg-gray-50">
                <th class="py-3 px-4 border text-left">ID</th>
                <th class="py-3 px-4 border text-left">Name</th>
                <th class="py-3 px-4 border text-left">Icon</th>
                <th class="py-3 px-4 border text-left">Actions</th>
              </tr>
            </thead>
            <tbody id="productTableBody">
              <!-- Dữ liệu sẽ được thêm bằng JavaScript -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center hidden">
    <div class="bg-white p-6 rounded shadow w-full max-w-md">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-semibold">Edit Hoppy Tag</h3>
        <button onclick="closeEditModal()" class="text-gray-500 hover:text-gray-700">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <form id="editTagForm" class="space-y-4">
        <input type="hidden" id="editTagId">
        <div>
          <label for="editTagName" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
          <input type="text" id="editTagName" name="editTagName" 
                 class="w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" 
                 placeholder="Enter tag name" required>
        </div>
        
        <div>
          <label for="editTagIcon" class="block text-sm font-medium text-gray-700 mb-1">Icon URL</label>
          <input type="text" id="editTagIcon" name="editTagIcon" 
                 class="w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" 
                 placeholder="Enter icon URL" required>
        </div>
        
        <div class="flex justify-end space-x-3 pt-4">
          <button type="button" onclick="closeEditModal()" 
                  class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Cancel
          </button>
          <button type="submit" 
                  class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Update Tag
          </button>
        </div>
      </form>
    </div>
  </div>
  <!-- Team Section -->
  <div id="team-section" class="hidden">
    <h1 class="text-2xl font-semibold mb-6">Team Members</h1>
    <div class="bg-white p-6 rounded-lg shadow max-w-4xl">
      <p class="text-gray-600">Team functionality will be available soon.</p>
    </div>
  </div>
</div>
</div>

  <script>
    // Khai báo mảng sampleTags
    const sampleTags = [
      { id: 1, name: "DatPhan", icon: "https://placehold.co/30" },
    ];

    // Load dữ liệu khi trang được tải
    document.addEventListener('DOMContentLoaded', function() {
      loadTags();
    });

    // Hàm load tags vào bảng
    function loadTags() {
      const tbody = document.getElementById('productTableBody');
      tbody.innerHTML = '';
      
      sampleTags.forEach(tag => {
        const row = document.createElement('tr');
        row.className = 'hover-row border-b';
        row.innerHTML = `
          <td class="py-3 px-4">${tag.id}</td>
          <td class="py-3 px-4">${tag.name}</td>
          <td class="py-3 px-4">
            <img src="${tag.icon}" alt="${tag.name} icon" class="h-6 w-6 object-contain">
          </td>
          <td class="py-3 px-4 space-x-2">
            <button class="text-blue-600 hover:text-blue-800" onclick="viewTag(${tag.id})">
              <i class="fas fa-eye"></i>
            </button>
            <button class="text-yellow-600 hover:text-yellow-800" onclick="editTag(${tag.id})">
              <i class="fas fa-edit"></i>
            </button>
            <button class="text-red-600 hover:text-red-800" onclick="deleteTag(${tag.id})">
              <i class="fas fa-trash"></i>
            </button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Hàm xem chi tiết tag
    function viewTag(id) {
      const tag = sampleTags.find(t => t.id === id);
      if (tag) {
        alert(`Tag Details:\nID: ${tag.id}\nName: ${tag.name}\nIcon: ${tag.icon}`);
      }
    }

    // Hàm chỉnh sửa tag
    function editTag(id) {
      const tag = sampleTags.find(t => t.id === id);
      if (tag) {
        document.getElementById('editTagId').value = tag.id;
        document.getElementById('editTagName').value = tag.name;
        document.getElementById('editTagIcon').value = tag.icon;
        document.getElementById('editModal').classList.remove('hidden');
      }
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.add('hidden');
    }

    // Xử lý submit form chỉnh sửa
    document.getElementById('editTagForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const id = parseInt(document.getElementById('editTagId').value);
      const name = document.getElementById('editTagName').value;
      const icon = document.getElementById('editTagIcon').value;
      
      if (!name || !icon) {
        alert('Please fill in all fields');
        return;
      }
      
      // Cập nhật trong mảng sampleTags
      const tagIndex = sampleTags.findIndex(t => t.id === id);
      if (tagIndex !== -1) {
        sampleTags[tagIndex] = { id, name, icon };
      }
      
      // Cập nhật giao diện
      loadTags();
      closeEditModal();
    });

    // Hàm xóa tag
    function deleteTag(id) {
      if (confirm('Are you sure you want to delete this tag?')) {
        // Xóa khỏi mảng sampleTags
        const index = sampleTags.findIndex(tag => tag.id === id);
        if (index !== -1) {
          sampleTags.splice(index, 1);
          loadTags(); // Tải lại bảng
        }
      }
    }

    // Other existing functions...
    function showSection(section) {
      const sections = ['tasks', 'team'];
      sections.forEach(sec => {
        const el = document.getElementById(`${sec}-section`);
        if (sec === section) {
          el.classList.remove('hidden');
        } else {
          el.classList.add('hidden');
        }
      });
    }

    // Toggle profile dropdown
    document.getElementById('profileDropdownBtn').addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('profileDropdown').classList.toggle('show');
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', function() {
      document.getElementById('profileDropdown').classList.remove('show');
    });

    // Prevent dropdown from closing when clicking inside
    document.getElementById('profileDropdown').addEventListener('click', function(e) {
      e.stopPropagation();
    });

    // Logout function
    document.getElementById('logoutBtn').addEventListener('click', function(e) {
      e.preventDefault();
      if (confirm('Are you sure you want to logout?')) {
        alert('Logged out successfully!');
        // Add actual logout logic here
      }
    });
  </script>
</body>
</html>
