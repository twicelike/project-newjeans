<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Hoppy Tag</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>
    body {
      background-image: url('./img/br.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }
    .form-container {
      background-color: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(5px);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="form-container p-8 rounded-lg shadow-xl w-full max-w-md">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">Create New Hoppy Tag</h1>
    </div>
    
    <form id="createTagForm" class="space-y-4" action="main.html" method="POST">
      <div>
        <label for="tagName" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
        <input type="text" id="tagName" name="tagName" 
               class="w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" 
               placeholder="Enter tag name" required>
      </div>
      
      <div>
        <label for="tagIcon" class="block text-sm font-medium text-gray-700 mb-1">Icon URL</label>
        <input type="text" id="tagIcon" name="tagIcon" 
               class="w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" 
               placeholder="Enter icon URL" required>
      </div>
      
      <div class="flex justify-end space-x-3 pt-4">
        <a href="main.html" class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
          Cancel
        </a>
        <button type="submit" 
                class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
          Create Tag
        </button>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('createTagForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('tagName').value;
      const icon = document.getElementById('tagIcon').value;
      
      if (!name || !icon) {
        alert('Please fill in all fields');
        return;
      }
      
      console.log('Creating tag:', { name, icon });
      window.location.href = 'main.html';
    });
  </script>
</body>
</html>
