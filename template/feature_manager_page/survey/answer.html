<!DOCTYPE html>
<html>
<head>
    <title>Answer Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        /* Style for dropdown profile */
        .profile-dropdown {
            display: none;
            position: absolute;
            right: 1rem;
            top: 3.5rem;
            background-color: white;
            min-width: 200px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
            border-radius: 4px;
        }
        
        .profile-dropdown a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        
        .profile-dropdown a:hover {
            background-color: #f1f1f1;
        }
        
        .show {
            display: block;
        }
        
        /* Style for question types */
        .text-answer {
            border-bottom: 1px solid #d1d5db;
            padding: 8px 0;
            width: 100%;
        }
        
        .paragraph-answer {
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 8px;
            width: 100%;
            min-height: 100px;
            resize: vertical;
        }
        
        /* Style for answer form */
        .answer-form .question-title {
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .answer-form .question-item {
            margin-bottom: 24px;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1rem;
            background-color: white;
        }
    </style>
</head>
<body class="bg-purple-100">
    <div class="flex justify-between items-center p-4 bg-white shadow relative">
        <div class="flex items-center space-x-2">
            <img src="./img/logo-2.png" alt="Logo" class="rounded-full h-8 w-8">
            <span id="answerFormTitle" class="text-lg font-semibold">Survey Answers</span>
        </div>
        <div class="flex items-center space-x-4">
            <button id="backToBuilderBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded transition">
                <i class="fas fa-arrow-left mr-2"></i> Back to Builder
            </button>
            
            <!-- Profile section -->
            <div class="relative">
                <div id="profileBtn" class="flex items-center space-x-2 cursor-pointer">
                    <img src="https://placehold.co/40x40" alt="Profile" class="rounded-full h-8 w-8">
                    <span class="hidden md:inline">User</span>
                    <i class="fas fa-chevron-down text-gray-600 text-xs"></i>
                </div>
                
                <div id="profileDropdown" class="profile-dropdown">
                    <a href="#"><i class="fas fa-user mr-2"></i> Profile</a>
                    <a href="#"><i class="fas fa-cog mr-2"></i> Settings</a>
                    <a href="#"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                </div>
            </div>
        </div>
    </div>
    
    <div class="flex justify-center mt-4">
        <div class="w-full max-w-4xl bg-white p-6 rounded shadow answer-form">
            <div class="border-b-2 border-purple-600 pb-2 mb-4">
                <h1 id="surveyTitle" class="text-2xl font-semibold"></h1>
            </div>
            
            <div id="answersContainer"></div>
            
            <div class="mt-6 flex justify-between">
                <button id="saveDraftBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-6 py-2 rounded transition">
                    Save Draft
                </button>
                <button id="submitAnswersBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded transition">
                    Submit Answers
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ========== Profile dropdown handling ==========
            const profileBtn = document.getElementById('profileBtn');
            const profileDropdown = document.getElementById('profileDropdown');
            
            profileBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                profileDropdown.classList.toggle('show');
            });
            
            document.addEventListener('click', function() {
                profileDropdown.classList.remove('show');
            });
            
            profileDropdown.addEventListener('click', function(e) {
                e.stopPropagation();
            });
            
            // ========== Load form data ==========
            const formData = JSON.parse(localStorage.getItem('surveyFormData'));
            const surveyTitle = document.getElementById('surveyTitle');
            const answersContainer = document.getElementById('answersContainer');
            
            if (!formData) {
                surveyTitle.textContent = 'No survey found';
                answersContainer.innerHTML = '<p class="text-center text-gray-500">Please create a survey first</p>';
                return;
            }
            
            // Display survey title
            surveyTitle.textContent = formData.title || 'Untitled Survey';
            
            // Render questions
            formData.questions.forEach((question, index) => {
                const questionElement = document.createElement('div');
                questionElement.className = 'question-item';
                
                questionElement.innerHTML = `
                    <div class="question-title">${index + 1}. ${question.title || 'Untitled question'}</div>
                `;
                
                if (question.type === 'radio') {
                    question.options.forEach(option => {
                        const optionElement = document.createElement('div');
                        optionElement.className = 'flex items-center mb-2';
                        
                        optionElement.innerHTML = `
                            <input type="radio" name="answer-${question.id}" id="option-${question.id}-${option.text}" 
                                   class="mr-2 h-5 w-5 text-purple-600">
                            <label for="option-${question.id}-${option.text}">${option.text}</label>
                        `;
                        
                        questionElement.appendChild(optionElement);
                    });
                } 
                else if (question.type === 'checkbox') {
                    question.options.forEach(option => {
                        const optionElement = document.createElement('div');
                        optionElement.className = 'flex items-center mb-2';
                        
                        optionElement.innerHTML = `
                            <input type="checkbox" name="answer-${question.id}" id="option-${question.id}-${option.text}" 
                                   class="mr-2 h-5 w-5 text-purple-600">
                            <label for="option-${question.id}-${option.text}">${option.text}</label>
                        `;
                        
                        questionElement.appendChild(optionElement);
                    });
                } 
                else if (question.type === 'text') {
                    questionElement.innerHTML += `
                        <input type="text" name="answer-${question.id}" 
                               class="text-answer mt-2" placeholder="Your answer">
                    `;
                } 
                else if (question.type === 'paragraph') {
                    questionElement.innerHTML += `
                        <textarea name="answer-${question.id}" 
                                  class="paragraph-answer mt-2" placeholder="Your answer"></textarea>
                    `;
                }
                
                answersContainer.appendChild(questionElement);
            });
            
            // ========== Button handlers ==========
            const backToBuilderBtn = document.getElementById('backToBuilderBtn');
            const saveDraftBtn = document.getElementById('saveDraftBtn');
            const submitAnswersBtn = document.getElementById('submitAnswersBtn');
            
            backToBuilderBtn.addEventListener('click', function() {
                window.location.href = 'survey.html';
            });
            
            saveDraftBtn.addEventListener('click', function() {
                const answers = collectAnswers();
                localStorage.setItem('surveyDraft', JSON.stringify(answers));
                alert('Draft saved successfully!');
            });
            
            submitAnswersBtn.addEventListener('click', function() {
                const answers = collectAnswers();
                // Here you would typically send answers to server
                console.log('Submitted answers:', answers);
                localStorage.removeItem('surveyDraft');
                alert('Thank you for completing the survey!');
                window.location.href = 'index.html';
            });
            
            // ========== Helper functions ==========
            function collectAnswers() {
                const answers = [];
                const answerInputs = document.querySelectorAll('#answersContainer input, #answersContainer textarea');
                
                answerInputs.forEach(input => {
                    if ((input.type === 'radio' || input.type === 'checkbox') && input.checked) {
                        answers.push({
                            questionId: input.name.replace('answer-', ''),
                            answer: input.nextElementSibling.textContent
                        });
                    } else if (input.type === 'text' || input.tagName === 'TEXTAREA') {
                        if (input.value.trim()) {
                            answers.push({
                                questionId: input.name.replace('answer-', ''),
                                answer: input.value
                            });
                        }
                    }
                });
                
                return {
                    surveyId: formData.title,
                    responses: answers,
                    timestamp: new Date().toISOString()
                };
            }
            
            // Load draft answers if exists
            const draftAnswers = JSON.parse(localStorage.getItem('surveyDraft'));
            if (draftAnswers) {
                draftAnswers.responses.forEach(response => {
                    const input = document.querySelector(`[name="answer-${response.questionId}"]`);
                    if (input) {
                        if (input.type === 'radio' || input.type === 'checkbox') {
                            // For radio/checkbox, find the option with matching text
                            const options = document.querySelectorAll(`[name="answer-${response.questionId}"]`);
                            options.forEach(opt => {
                                if (opt.nextElementSibling.textContent === response.answer) {
                                    opt.checked = true;
                                }
                            });
                        } else {
                            input.value = response.answer;
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
