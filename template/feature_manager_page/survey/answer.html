<!DOCTYPE html>
<html>
<head>
    <title>Answer Survey</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        /* Responsive profile dropdown */
        .profile-dropdown {
            display: none;
            position: absolute;
            right: 1rem;
            top: 3.5rem;
            background-color: white;
            min-width: 200px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 10;
            border-radius: 0.5rem;
        }
        
        .profile-dropdown a {
            color: #4b5563;
            padding: 0.75rem 1rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }
        
        .profile-dropdown a:hover {
            background-color: #f3f4f6;
            color: #7c3aed;
        }
        
        /* Responsive form elements */
        .paragraph-answer {
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            padding: 0.75rem;
            width: 100%;
            min-height: 120px;
            resize: vertical;
            font-size: 1rem;
        }
        
        .question-item {
            margin-bottom: 1.5rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1.25rem;
            background-color: white;
            transition: all 0.2s;
        }
        
        .question-title {
            font-weight: 600;
            margin-bottom: 0.75rem;
            font-size: 1.125rem;
        }
        
        /* Responsive logo */
        .logo-img {
            width: 3.5rem;
            height: 3.5rem;
            object-fit: contain;
        }
        
        /* Mobile-specific styles */
        @media (max-width: 640px) {
            .header-content {
                padding: 1rem;
                flex-direction: column;
                align-items: flex-start;
            }
            
            .profile-section {
                width: 100%;
                justify-content: space-between;
                margin-top: 0.5rem;
            }
            
            .form-container {
                padding: 1rem;
                margin: 0.5rem;
                width: calc(100% - 1rem);
            }
            
            .question-title {
                font-size: 1rem;
            }
            
            .paragraph-answer {
                min-height: 100px;
                font-size: 0.875rem;
            }
            
            .action-buttons {
                flex-direction: column;
                gap: 0.75rem;
            }
            
            .action-buttons button {
                width: 100%;
            }
        }
    </style>
</head>
<body class="bg-purple-100">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 bg-white shadow relative header-content">
        <div class="flex items-center gap-3">
            <a href="#" class="bg-white p-1 rounded-full shadow-sm">
                <img src="./img/logo-2.png" alt="Logo" class="logo-img">
            </a>
            <span id="answerFormTitle" class="text-lg sm:text-xl font-semibold">Survey Answers</span>
        </div>
        
        <div class="relative flex items-center profile-section">
            <div id="profileBtn" class="flex items-center space-x-2 cursor-pointer group">
                <img src="https://placehold.co/40x40" alt="Profile" class="rounded-full h-8 w-8 sm:h-10 sm:w-10 border-2 border-purple-100 group-hover:border-purple-300 transition">
                <span class="hidden sm:inline font-medium text-gray-700">User</span>
                <i class="fas fa-chevron-down text-gray-500 text-xs transition transform group-hover:translate-y-0.5"></i>
            </div>
            
            <div id="profileDropdown" class="profile-dropdown">
                <a href="#"><i class="fas fa-user mr-2"></i> Profile</a>
                <a href="#"><i class="fas fa-cog mr-2"></i> Settings</a>
                <a href="#"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
            </div>
        </div>
    </div>
    
    <div class="flex justify-center mt-2 sm:mt-4 px-2 sm:px-4">
        <div class="w-full max-w-4xl bg-white p-4 sm:p-6 rounded-lg shadow-sm form-container">
            <div class="border-b-2 border-purple-600 pb-3 mb-6">
                <h1 id="surveyTitle" class="text-xl sm:text-2xl font-semibold"></h1>
            </div>
            
            <div id="answersContainer"></div>
            
            <div class="mt-6 flex flex-col sm:flex-row justify-between gap-3 action-buttons">
                <button id="saveDraftBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 sm:px-6 py-2 rounded transition">
                    <i class="fas fa-save mr-2"></i>Save Draft
                </button>
                <button id="submitAnswersBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 sm:px-6 py-2 rounded transition">
                    <i class="fas fa-paper-plane mr-2"></i>Submit Answers
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ========== Profile dropdown handling ==========
            const profileBtn = document.getElementById('profileBtn');
            const profileDropdown = document.getElementById('profileDropdown');
            let dropdownVisible = false;
            
            profileBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                dropdownVisible = !dropdownVisible;
                profileDropdown.style.display = dropdownVisible ? 'block' : 'none';
            });
            
            document.addEventListener('click', function() {
                if (dropdownVisible) {
                    dropdownVisible = false;
                    profileDropdown.style.display = 'none';
                }
            });
            
            // ========== Load form data ==========
            const formData = JSON.parse(localStorage.getItem('surveyFormData'));
            const surveyTitle = document.getElementById('surveyTitle');
            const answersContainer = document.getElementById('answersContainer');
            
            if (!formData) {
                surveyTitle.textContent = 'No survey found';
                answersContainer.innerHTML = '<p class="text-center text-gray-500 py-8">Please create a survey first</p>';
                document.getElementById('saveDraftBtn').disabled = true;
                document.getElementById('submitAnswersBtn').disabled = true;
                return;
            }
            
            // Display survey title
            surveyTitle.textContent = formData.title || 'Untitled Survey';
            
            // Render questions with responsive layout
            formData.questions.forEach((question, index) => {
                const questionElement = document.createElement('div');
                questionElement.className = 'question-item';
                
                questionElement.innerHTML = `
                    <div class="question-title">${index + 1}. ${question.title || 'Untitled question'}</div>
                `;
                
                if (question.type === 'radio') {
                    question.options.forEach(option => {
                        const optionElement = document.createElement('div');
                        optionElement.className = 'flex items-center mb-3';
                        
                        optionElement.innerHTML = `
                            <input type="radio" name="answer-${question.id}" id="option-${question.id}-${option.text.replace(/\s+/g, '-')}" 
                                   class="mr-3 h-5 w-5 text-purple-600">
                            <label for="option-${question.id}-${option.text.replace(/\s+/g, '-')}" class="text-sm sm:text-base">${option.text}</label>
                        `;
                        
                        questionElement.appendChild(optionElement);
                    });
                } 
                else if (question.type === 'checkbox') {
                    question.options.forEach(option => {
                        const optionElement = document.createElement('div');
                        optionElement.className = 'flex items-center mb-3';
                        
                        optionElement.innerHTML = `
                            <input type="checkbox" name="answer-${question.id}" id="option-${question.id}-${option.text.replace(/\s+/g, '-')}" 
                                   class="mr-3 h-5 w-5 text-purple-600">
                            <label for="option-${question.id}-${option.text.replace(/\s+/g, '-')}" class="text-sm sm:text-base">${option.text}</label>
                        `;
                        
                        questionElement.appendChild(optionElement);
                    });
                }
                else if (question.type === 'paragraph') {
                    questionElement.innerHTML += `
                        <textarea name="answer-${question.id}" 
                                  class="paragraph-answer mt-3" placeholder="Type your answer here..."></textarea>
                    `;
                }
                
                answersContainer.appendChild(questionElement);
            });
            
            // ========== Button handlers ==========
            const saveDraftBtn = document.getElementById('saveDraftBtn');
            const submitAnswersBtn = document.getElementById('submitAnswersBtn');
            
            saveDraftBtn.addEventListener('click', function() {
                const answers = collectAnswers();
                localStorage.setItem('surveyDraft', JSON.stringify(answers));
                alert('Draft saved successfully!');
            });
            
            submitAnswersBtn.addEventListener('click', function() {
                if (confirm('Are you sure you want to submit your answers?')) {
                    const answers = collectAnswers();
                    console.log('Submitted answers:', answers);
                    localStorage.removeItem('surveyDraft');
                    alert('Thank you for completing the survey!');
                    // Redirect or show success message
                }
            });
            
            // ========== Helper functions ==========
            function collectAnswers() {
                const answers = [];
                const answerInputs = document.querySelectorAll('#answersContainer input, #answersContainer textarea');
                
                answerInputs.forEach(input => {
                    if ((input.type === 'radio' || input.type === 'checkbox') && input.checked) {
                        answers.push({
                            questionId: input.name.replace('answer-', ''),
                            answer: input.nextElementSibling.textContent
                        });
                    } else if (input.tagName === 'TEXTAREA' && input.value.trim()) {
                        answers.push({
                            questionId: input.name.replace('answer-', ''),
                            answer: input.value
                        });
                    }
                });
                
                return {
                    surveyId: formData.title,
                    responses: answers,
                    timestamp: new Date().toISOString()
                };
            }
            
            // Load draft answers if exists
            const draftAnswers = JSON.parse(localStorage.getItem('surveyDraft'));
            if (draftAnswers) {
                draftAnswers.responses.forEach(response => {
                    const input = document.querySelector(`[name="answer-${response.questionId}"]`);
                    if (input) {
                        if (input.type === 'radio' || input.type === 'checkbox') {
                            const options = document.querySelectorAll(`[name="answer-${response.questionId}"]`);
                            options.forEach(opt => {
                                if (opt.nextElementSibling.textContent === response.answer) {
                                    opt.checked = true;
                                }
                            });
                        } else if (input.tagName === 'TEXTAREA') {
                            input.value = response.answer;
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
