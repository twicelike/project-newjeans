<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hobby Tags Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Roboto', sans-serif;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #f9f9f9;
      min-width: 160px;
      box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
      z-index: 1;
      border-radius: 4px;
      left: 1.5rem;
      top: 5rem;
    }

    .dropdown-content a {
      color: #333;
      padding: 10px 16px;
      text-decoration: none;
      display: block;
      font-size: 14px;
    }

    .dropdown-content a:hover {
      background-color: #f1f1f1;
    }

    .show {
      display: block;
    }

    .hover-row:hover {
      background-color: #f8fafc;
    }

    #editModal,
    #suspendModal,
    #reportModal,
    #createPostModal,
    #createTagModal {
      z-index: 100;
    }

    .pagination button {
      min-width: 2rem;
    }

    .pagination button:hover:not(:disabled) {
      background-color: #f3f4f6;
    }

    #imagePreview img,
    #editImagePreview img,
    #currentImagePreview img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 4px;
      border: 1px solid #e5e7eb;
    }

    #removeImageBtn,
    #removeEditImageBtn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    #removeImageBtn:hover,
    #removeEditImageBtn:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body class="bg-gray-100">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <div class="bg-gray-800 text-white w-64 p-6 relative">
      <div class="flex items-center mb-8 cursor-pointer group" id="profileDropdownBtn">
        <img src="https://placehold.co/50x50" alt="Profile" class="rounded-full mr-4">
        <div>
          <h2 class="text-lg font-semibold group-hover:text-blue-300 transition">DatPhan</h2>
          <p class="text-xs text-gray-400">Admin</p>
        </div>
        <i class="fas fa-chevron-down ml-auto text-gray-400 text-xs group-hover:text-white transition"></i>
      </div>

      <!-- Profile dropdown -->
      <div id="profileDropdown" class="dropdown-content">
        <!-- TODO: Thêm c:forEach nếu các mục dropdown lấy từ dữ liệu động -->
        <a href="#" class="hover:bg-gray-100"><i class="fas fa-user mr-2 text-gray-600"></i> Profile</a>
        <a href="#" class="hover:bg-gray-100"><i class="fas fa-cog mr-2 text-gray-600"></i> Settings</a>
        <a href="#" class="hover:bg-gray-100 text-red-500" id="logoutBtn"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
      </div>

      <nav>
        <h3 class="text-gray-400 uppercase text-xs mb-2">Tasks</h3>
        <ul class="mb-6">
          <!-- TODO: Thêm c:forEach nếu danh sách task lấy từ server -->
          <li class="mb-2">
            <a href="hobbytags.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-tasks mr-2"></i> Hobby Tags
            </a>
          </li>
          <li class="mb-2">
            <a href="posts.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-newspaper mr-2"></i> Posts
            </a>
          </li>
          <li class="mb-2">
            <a href="report.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-flag mr-2"></i> Reports
            </a>
          </li>
          <li class="mb-2">
            <a href="suspend.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-ban mr-2"></i> Suspended Users
            </a>
          </li>
          <li class="mb-2">
            <a href="feedback.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-comment mr-2"></i> User Feedback
            </a>
          </li>
        </ul>
      </nav>
    </div>

    <!-- Main content -->
    <div class="flex-1 p-6" id="main-content">
      <h1 class="text-2xl font-bold text-gray-800">Welcome to Admin Dashboard</h1>
      <p class="text-gray-600 mt-2">Select a section from the sidebar to get started</p>
    </div>
  </div>

  <!-- Suspend User Modal -->
  <div id="suspendModal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center hidden">
    <div class="bg-white p-6 rounded shadow w-full max-w-md">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-semibold">Suspend User</h3>
        <button onclick="closeModal('suspendModal')" class="text-gray-500 hover:text-gray-700">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="suspendForm" class="space-y-4">
        <input type="hidden" id="suspendUserId">
        <div>
          <label for="suspendDuration" class="block text-sm font-medium text-gray-700 mb-1">Duration</label>
          <select id="suspendDuration" name="suspendDuration"
            class="w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" required>
            <option value="">Select duration</option>
            <option value="1">1 day</option>
            <option value="3">3 days</option>
            <option value="7">1 week</option>
            <option value="30">1 month</option>
            <option value="0">Permanent</option>
          </select>
        </div>
        <div>
          <label for="suspendReason" class="block text-sm font-medium text-gray-700 mb-1">Reason</label>
          <textarea id="suspendReason" name="suspendReason" rows="3"
            class="w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500"
            placeholder="Enter reason for suspension" required></textarea>
        </div>
        <div class="flex justify-end space-x-3 pt-4">
          <button type="button" onclick="closeModal('suspendModal')"
            class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Cancel
          </button>
          <button type="submit"
            class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
            Suspend User
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- View Feedback Modal -->
  <div id="viewFeedbackModal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center hidden">
    <div class="bg-white p-6 rounded shadow w-full max-w-md">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-semibold">Feedback Details</h3>
        <button onclick="closeModal('viewFeedbackModal')" class="text-gray-500 hover:text-gray-700">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <p id="feedbackEmail" class="font-medium"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Comment</label>
          <p id="feedbackComment" class="whitespace-pre-line"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
          <p id="feedbackDate"></p>
        </div>
        <div class="flex justify-end pt-4">
          <button onclick="closeModal('viewFeedbackModal')"
            class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Close
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Tag Modal -->
  <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center hidden">
    <div class="bg-white p-6 rounded shadow w-full max-w-md">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-semibold">Edit Tag</h3>
        <button onclick="closeModal('editModal')" class="text-gray-500 hover:text-gray-700">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="editTagForm" class="space-y-4">
        <input type="hidden" id="editTagId">
        <div>
          <label for="editTagName" class="block text-sm font-medium text-gray-700 mb-1">Tag Name</label>
          <input type="text" id="editTagName" name="editTagName"
            class="w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500"
            placeholder="Enter tag name" required>
        </div>
        <div>
          <label for="editTagIcon" class="block text-sm font-medium text-gray-700 mb-1">Icon URL</label>
          <input type="text" id="editTagIcon" name="editTagIcon"
            class="w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500"
            placeholder="Enter icon URL" required>
        </div>
        <div class="flex justify-end space-x-3 pt-4">
          <button type="button" onclick="closeModal('editModal')"
            class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Cancel
          </button>
          <button type="submit"
            class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="./js/main.js"></script>
</body>

</html>
