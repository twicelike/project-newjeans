<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hobbyy Tags Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <div class="bg-gray-800 text-white w-64 p-6 relative">
      <div class="flex items-center mb-8 cursor-pointer group" id="profileDropdownBtn">
        <img src="https://placehold.co/50x50" alt="Profile" class="rounded-full mr-4">
        <div>
          <h2 class="text-lg font-semibold group-hover:text-blue-300 transition">DatPhan</h2>
          <p class="text-xs text-gray-400">Admin</p>
        </div>
        <i class="fas fa-chevron-down ml-auto text-gray-400 text-xs group-hover:text-white transition"></i>
      </div>

      <!-- Profile dropdown -->
      <div id="profileDropdown" class="dropdown-content">
        <a href="#" class="hover:bg-gray-100"><i class="fas fa-user mr-2 text-gray-600"></i> Profile</a>
        <a href="#" class="hover:bg-gray-100"><i class="fas fa-cog mr-2 text-gray-600"></i> Settings</a>
        <a href="#" class="hover:bg-gray-100 text-red-500" id="logoutBtn"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
      </div>

      <nav>
        <h3 class="text-gray-400 uppercase text-xs mb-2">Tasks</h3>
        <ul class="mb-6">
          <li class="mb-2">
            <a href="./HobbyTag/hobbytags.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-tasks mr-2"></i> Hobby Tags
            </a>
          </li>
          <li class="mb-2">
            <a href="./Post/posts.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-newspaper mr-2"></i> Posts
            </a>
          </li>
          <li class="mb-2">
            <a href="./Suspend&Repost/suspendreport.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-ban mr-2"></i> Suspended Users & Reports
            </a>
          </li>
          <li class="mb-2">
            <a href="./Feedback/feedback.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-comment mr-2"></i> User Feedback
            </a>
          </li>
        </ul>
      </nav>
    </div>

    <!-- Main content -->
    <div class="flex-1 p-6">
      <h1 class="text-2xl font-semibold mb-4">Welcome to Admin Dashboard</h1>
      <p class="text-gray-600">Please select a section from the sidebar to begin.</p>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
