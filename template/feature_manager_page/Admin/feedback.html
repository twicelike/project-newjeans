<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Feedback</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
  <style>
    .hover-row:hover {
      background-color: #f8fafc;
    }
    .pagination button {
      min-width: 2rem;
    }
    .pagination button:hover:not(:disabled) {
      background-color: #f3f4f6;
    }
    #viewFeedbackModal {
      z-index: 100;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #f9f9f9;
      min-width: 160px;
      box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
      z-index: 1;
      border-radius: 4px;
      left: 1.5rem;
      top: 5rem;
    }

    .dropdown-content a {
      color: #333;
      padding: 10px 16px;
      text-decoration: none;
      display: block;
      font-size: 14px;
    }

    .dropdown-content a:hover {
      background-color: #f1f1f1;
    }

    .show {
      display: block;
    }
  </style>
</head>

<body class="bg-gray-100">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <div class="bg-gray-800 text-white w-64 p-6 relative">
      <div class="flex items-center mb-8 cursor-pointer group" id="profileDropdownBtn">
        <img src="https://placehold.co/50x50" alt="Profile" class="rounded-full mr-4">
        <div>
          <h2 class="text-lg font-semibold group-hover:text-blue-300 transition">DatPhan</h2>
          <p class="text-xs text-gray-400">Admin</p>
        </div>
        <i class="fas fa-chevron-down ml-auto text-gray-400 text-xs group-hover:text-white transition"></i>
      </div>

      <!-- Profile dropdown -->
      <div id="profileDropdown" class="dropdown-content">
        <!-- TODO: Thêm c:forEach ở đây nếu các mục dropdown lấy từ dữ liệu động -->
        <a href="#" class="hover:bg-gray-100"><i class="fas fa-user mr-2 text-gray-600"></i> Profile</a>
        <a href="#" class="hover:bg-gray-100"><i class="fas fa-cog mr-2 text-gray-600"></i> Settings</a>
        <a href="#" class="hover:bg-gray-100 text-red-500" id="logoutBtn"><i class="fas fa-sign-out-alt mr-2"></i>
          Logout</a>
      </div>

      <nav>
        <h3 class="text-gray-400 uppercase text-xs mb-2">Tasks</h3>
        <ul class="mb-6">
          <!-- TODO: Thêm c:forEach ở đây nếu danh sách task lấy từ server -->
          <li class="mb-2">
            <a href="hobbytags.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-tasks mr-2"></i> Hobby Tags
            </a>
          </li>
          <li class="mb-2">
            <a href="posts.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-newspaper mr-2"></i> Posts
            </a>
          </li>
          <li class="mb-2">
            <a href="suspendreport.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-ban mr-2"></i> Suspended Users & Reports
            </a>
          </li>
          <li class="mb-2">
            <a href="feedback.html" class="flex items-center text-blue-300 transition">
              <i class="fas fa-comment mr-2"></i> User Feedback
            </a>
          </li>
        </ul>
      </nav>
    </div>

    <!-- Feedback Content -->
    <div class="flex-1 p-6">
      <div class="container mx-auto bg-white p-6 rounded shadow">
        <div class="flex justify-between items-center mb-4">
          <h1 class="text-2xl font-semibold">User Feedback</h1>
          <div class="flex items-center space-x-2">
            <div class="relative">
              <input type="text" id="feedbackSearch" placeholder="Search feedback..."
                class="border border-gray-300 rounded-md px-3 py-1 pl-8 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <i class="fas fa-search absolute left-2 top-2 text-gray-400"></i>
            </div>
          </div>
        </div>

        <table class="min-w-full bg-white border">
          <thead>
            <tr class="bg-gray-50">
              <th class="py-3 px-4 border text-left">ID</th>
              <th class="py-3 px-4 border text-left">Email</th>
              <th class="py-3 px-4 border text-left">Comment</th>
              <th class="py-3 px-4 border text-left">Date</th>
              <th class="py-3 px-4 border text-left">Actions</th>
            </tr>
          </thead>
          <tbody id="feedbackTableBody">
            <!-- TODO: Thêm c:forEach nếu danh sách reports lấy từ server -->
          </tbody>
        </table>

        <div class="flex items-center justify-between mt-4">
          <div class="text-sm text-gray-600">
            Showing <span id="feedback-pagination-start">1</span> to <span id="feedback-pagination-end">5</span> of
            <span id="feedback-pagination-total">0</span> items
          </div>
          <div class="flex space-x-1 pagination">
            <button id="feedback-prev-page"
              class="px-3 py-1 border rounded-md bg-white text-gray-700 disabled:opacity-50" disabled>
              Previous
            </button>
            <div id="feedback-page-numbers" class="flex space-x-1">
              <!-- Page numbers will be inserted here by JavaScript -->
            </div>
            <button id="feedback-next-page"
              class="px-3 py-1 border rounded-md bg-white text-gray-700 disabled:opacity-50" disabled>
              Next
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- View Feedback Modal -->
  <div id="viewFeedbackModal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center hidden">
    <div class="bg-white p-6 rounded shadow w-full max-w-md">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-semibold">Feedback Details</h3>
        <button onclick="closeModal('viewFeedbackModal')" class="text-gray-500 hover:text-gray-700">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <p id="feedbackEmail" class="font-medium"></p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Comment</label>
          <p id="feedbackComment" class="whitespace-pre-line"></p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
          <p id="feedbackDate"></p>
        </div>

        <div class="flex justify-end pt-4">
          <button onclick="closeModal('viewFeedbackModal')"
            class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Close
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>

</html>
