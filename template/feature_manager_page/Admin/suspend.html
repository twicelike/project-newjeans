<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suspended Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
    <style>
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1;
            border-radius: 4px;
            left: 1.5rem;
            top: 5rem;
        }

        .dropdown-content a {
            color: #333;
            padding: 10px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
        }

        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }

        .show {
            display: block;
        }

        .hover-row:hover {
            background-color: #f8fafc;
        }

        .pagination button {
            min-width: 2rem;
        }

        .pagination button:hover:not(:disabled) {
            background-color: #f3f4f6;
        }

        #suspendModal {
            z-index: 100;
        }
    </style>
</head>

<body class="bg-gray-100">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <div class="bg-gray-800 text-white w-64 p-6 relative">
            <div class="flex items-center mb-8 cursor-pointer group" id="profileDropdownBtn">
                <img src="https://placehold.co/50x50" alt="Profile" class="rounded-full mr-4">
                <div>
                    <h2 class="text-lg font-semibold group-hover:text-blue-300 transition">DatPhan</h2>
                    <p class="text-xs text-gray-400">Admin</p>
                </div>
                <i class="fas fa-chevron-down ml-auto text-gray-400 text-xs group-hover:text-white transition"></i>
            </div>

            <div id="profileDropdown" class="dropdown-content">
                <!-- TODO: Thêm c:forEach ở đây nếu các mục dropdown lấy từ dữ liệu động -->
                <a href="#"><i class="fas fa-user mr-2 text-gray-600"></i> Profile</a>
                <a href="#"><i class="fas fa-cog mr-2 text-gray-600"></i> Settings</a>
                <a href="#" class="text-red-500" id="logoutBtn"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
            </div>

            <nav>
                <h3 class="text-gray-400 uppercase text-xs mb-2">Tasks</h3>
                <ul class="mb-6">
                    <!-- TODO: Thêm c:forEach nếu danh sách task lấy từ server -->
                    <li class="mb-2">
                        <a href="hobbytags.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
                            <i class="fas fa-tasks mr-2"></i> Hobby Tags
                        </a>
                    </li>
                    <li class="mb-2">
                        <a href="posts.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
                            <i class="fas fa-newspaper mr-2"></i> Posts
                        </a>
                    </li>
                    <li class="mb-2">
                        <a href="report.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
                            <i class="fas fa-flag mr-2"></i> Reports
                        </a>
                    </li>
                    <li class="mb-2">
                        <a href="suspend.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
                            <i class="fas fa-ban mr-2"></i> Suspended Users
                        </a>
                    </li>
                    <li class="mb-2">
                        <a href="feedback.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
                            <i class="fas fa-comment mr-2"></i> User Feedback
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

        <!-- Content -->
        <div class="flex-1 p-6">
            <div class="container mx-auto">
                <!-- Suspended Users -->
                <div class="bg-white p-6 rounded shadow">
                    <div class="flex justify-between items-center mb-4">
                        <h1 class="text-2xl font-semibold">Suspended Users</h1>
                        <div class="relative">
                            <input type="text" id="suspendedUserSearch" placeholder="Search suspended users..."
                                class="border border-gray-300 rounded-md px-3 py-1 pl-8 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <i class="fas fa-search absolute left-2 top-2 text-gray-400"></i>
                        </div>
                    </div>

                    <table class="min-w-full bg-white border">
                        <thead>
                            <tr class="bg-gray-50">
                                <th class="py-3 px-4 border text-left">ID</th>
                                <th class="py-3 px-4 border text-left">Username</th>
                                <th class="py-3 px-4 border text-left">Reason</th>
                                <th class="py-3 px-4 border text-left">Suspended By</th>
                                <th class="py-3 px-4 border text-left">Date</th>
                                <th class="py-3 px-4 border text-left">Duration</th>
                                <th class="py-3 px-4 border text-left">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="suspendedUsersTableBody">
                            <!-- Dữ liệu sẽ được thêm bằng JS -->
                        </tbody>
                    </table>

                    <div class="flex justify-between mt-4 text-sm text-gray-600">
                        <div>Showing <span id="suspended-users-pagination-start">1</span> to <span
                                id="suspended-users-pagination-end">5</span> of <span
                                id="suspended-users-pagination-total">0</span> items</div>
                        <div class="flex space-x-1 pagination">
                            <button id="suspended-users-prev-page"
                                class="px-3 py-1 border rounded-md bg-white text-gray-700 disabled:opacity-50"
                                disabled>Previous</button>
                            <div id="suspended-users-page-numbers" class="flex space-x-1"></div>
                            <button id="suspended-users-next-page"
                                class="px-3 py-1 border rounded-md bg-white text-gray-700 disabled:opacity-50"
                                disabled>Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
  <script src="suspendreport.js"></script>

</body>

</html>
