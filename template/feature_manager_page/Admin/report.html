<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Reports</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
  <style>
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #f9f9f9;
      min-width: 160px;
      box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
      z-index: 1;
      border-radius: 4px;
      left: 1.5rem;
      top: 5rem;
    }

    .dropdown-content a {
      color: #333;
      padding: 10px 16px;
      text-decoration: none;
      display: block;
      font-size: 14px;
    }

    .dropdown-content a:hover {
      background-color: #f1f1f1;
    }

    .show {
      display: block;
    }

    .hover-row:hover {
      background-color: #f8fafc;
    }

    .pagination button {
      min-width: 2rem;
    }

    .pagination button:hover:not(:disabled) {
      background-color: #f3f4f6;
    }
  </style>
</head>

<body class="bg-gray-100">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <div class="bg-gray-800 text-white w-64 p-6 relative">
      <div class="flex items-center mb-8 cursor-pointer group" id="profileDropdownBtn">
        <img src="https://placehold.co/50x50" alt="Profile" class="rounded-full mr-4">
        <div>
          <h2 class="text-lg font-semibold group-hover:text-blue-300 transition">DatPhan</h2>
          <p class="text-xs text-gray-400">Admin</p>
        </div>
        <i class="fas fa-chevron-down ml-auto text-gray-400 text-xs group-hover:text-white transition"></i>
      </div>

      <div id="profileDropdown" class="dropdown-content">
        <!-- TODO: Thêm c:forEach nếu các mục dropdown lấy từ dữ liệu động -->
        <a href="#"><i class="fas fa-user mr-2 text-gray-600"></i> Profile</a>
        <a href="#"><i class="fas fa-cog mr-2 text-gray-600"></i> Settings</a>
        <a href="#" class="text-red-500" id="logoutBtn"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
      </div>

      <nav>
        <h3 class="text-gray-400 uppercase text-xs mb-2">Tasks</h3>
        <ul class="mb-6">
          <!-- TODO: Thêm c:forEach nếu danh sách task lấy từ server -->
          <li class="mb-2">
            <a href="hobbytags.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-tasks mr-2"></i> Hobby Tags
            </a>
          </li>
          <li class="mb-2">
            <a href="posts.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-newspaper mr-2"></i> Posts
            </a>
          </li>
          <li class="mb-2">
            <a href="report.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-flag mr-2"></i> Reports
            </a>
          </li>
          <li class="mb-2">
            <a href="suspend.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-ban mr-2"></i> Suspended Users
            </a>
          </li>
          <li class="mb-2">
            <a href="feedback.html" class="flex items-center text-gray-400 hover:text-blue-300 transition">
              <i class="fas fa-comment mr-2"></i> User Feedback
            </a>
          </li>
        </ul>
      </nav>
    </div>

    <!-- Content -->
    <div class="flex-1 p-6">
      <div class="container mx-auto">
        <!-- Reported Users -->
        <div class="bg-white p-6 rounded shadow">
          <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-semibold">User Reports</h1>
            <div class="relative">
              <input type="text" id="reportSearch" placeholder="Search reports..."
                class="border border-gray-300 rounded-md px-3 py-1 pl-8 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <i class="fas fa-search absolute left-2 top-2 text-gray-400"></i>
            </div>
          </div>

          <table class="min-w-full bg-white border">
            <thead>
              <tr class="bg-gray-50">
                <th class="py-3 px-4 border text-left">Report ID</th>
                <th class="py-3 px-4 border text-left">Reported User</th>
                <th class="py-3 px-4 border text-left">Reporter</th>
                <th class="py-3 px-4 border text-left">Reason</th>
                <th class="py-3 px-4 border text-left">Date</th>
                <th class="py-3 px-4 border text-left">Actions</th>
              </tr>
            </thead>
            <tbody id="reportTableBody">
              <!-- Dữ liệu sẽ được chèn bằng JavaScript -->
            </tbody>
          </table>

          <div class="flex justify-between mt-4 text-sm text-gray-600">
            <div>Showing <span id="report-pagination-start">1</span> to <span id="report-pagination-end">5</span> of
              <span id="report-pagination-total">0</span> items
            </div>
            <div class="flex space-x-1 pagination">
              <button id="report-prev-page"
                class="px-3 py-1 border rounded-md bg-white text-gray-700 disabled:opacity-50"
                disabled>Previous</button>
              <div id="report-page-numbers" class="flex space-x-1"></div>
              <button id="report-next-page"
                class="px-3 py-1 border rounded-md bg-white text-gray-700 disabled:opacity-50" disabled>Next</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Suspend Modal -->
    <div id="suspendModal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center hidden">
      <div class="bg-white p-6 rounded shadow w-full max-w-md">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-semibold">Suspend User</h3>
          <button onclick="closeModal('suspendModal')" class="text-gray-500 hover:text-gray-700"><i
              class="fas fa-times"></i></button>
        </div>
        <form id="suspendForm" class="space-y-4">
          <input type="hidden" id="suspendUserId">
          <div>
            <label for="suspendDuration" class="block text-sm font-medium text-gray-700 mb-1">Duration</label>
            <select id="suspendDuration" required class="w-full border rounded-md p-2 focus:ring-blue-500">
              <option value="">Select duration</option>
              <option value="1">1 day</option>
              <option value="3">3 days</option>
              <option value="7">1 week</option>
              <option value="30">1 month</option>
              <option value="0">Permanent</option>
            </select>
          </div>
          <div>
            <label for="suspendReason" class="block text-sm font-medium text-gray-700 mb-1">Reason</label>
            <textarea id="suspendReason" rows="3" class="w-full border rounded-md p-2 focus:ring-blue-500"
              required></textarea>
          </div>
          <div class="flex justify-end space-x-3 pt-4">
            <button type="button" onclick="closeModal('suspendModal')"
              class="px-4 py-2 border rounded-md text-gray-700 bg-white hover:bg-gray-50">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">Suspend
              User</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="./js/main.js"></script>
  <script src="./js/suspendreport.js"></script>
</body>

</html>
