    <script>
        const menuButton = document.getElementById("menuButton");
        const closeSidebar = document.getElementById("closeSidebar");
        const sidebar = document.getElementById("sidebar");
        const mainContent = document.getElementById("mainContent");

        let isSidebarOpen = true;

        function toggleSidebar() {
            isSidebarOpen = !isSidebarOpen;
            sidebar.style.transform = isSidebarOpen ? "translateX(0)" : "translateX(-100%)";
        }

        window.addEventListener("resize", function () {
            if (window.innerWidth <= 768) {
                sidebar.style.transform = "translateX(-100%)";
                isSidebarOpen = false;
            }
        });

        menuButton.addEventListener("click", toggleSidebar);
        closeSidebar.addEventListener("click", toggleSidebar);

        const links = document.querySelectorAll("nav a");
        const sections = document.querySelectorAll(".content-section");

        links.forEach(link => {
            link.addEventListener("click", function (event) {
                event.preventDefault();
                sections.forEach(section => section.classList.add("hidden"));
                document.getElementById(this.getAttribute("data-target")).classList.remove("hidden");
            });
        });

        document.getElementById("fileInput").addEventListener("change", function (event) {
            let file = event.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById("profilePic").src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        function handleImageUpload(input) {
            const container = document.getElementById('pictureContainer');
            const existingImages = container.querySelectorAll('img').length;
            const uploadButtons = container.querySelectorAll('label').length;
            
            if (existingImages < 6 && input.files && input.files[0]) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const imageContainer = document.createElement('div');
                    imageContainer.className = 'relative w-36 h-36';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'w-full h-full object-cover rounded-lg';
                    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerHTML = '×';
                    deleteBtn.className = 'absolute top-1 right-1 text-white rounded-full w-6 h-6 flex items-center justify-center hover:bg-gray-500';
                    deleteBtn.onclick = function() {
                        imageContainer.remove();
                        if (container.querySelectorAll('img').length < 6 && container.querySelectorAll('label').length === 0) {
                            addUploadButton(container);
                        }
                    };
                    
                    imageContainer.appendChild(img);
                    imageContainer.appendChild(deleteBtn);
                    
                    const uploadButton = container.querySelector('label');
                    if (uploadButton) {
                        container.insertBefore(imageContainer, uploadButton);
                    } else {
                        container.appendChild(imageContainer);
                    }
                    
                    // Remove upload button if 6 images
                    if (container.querySelectorAll('img').length >= 6) {
                        const uploadButton = container.querySelector('label');
                        if (uploadButton) uploadButton.remove();
                    }
                };
                
                reader.readAsDataURL(input.files[0]);
            }
        }

        function addUploadButton(container) {
            const label = document.createElement('label');
            label.className = 'w-36 h-36 border-2 border-dashed rounded-lg flex items-center justify-center cursor-pointer hover:bg-gray-50 transition-colors';
            label.innerHTML = `
                <input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(this)">
                <span class="text-4xl text-gray-400">+</span>
            `;
            container.appendChild(label);
        }
    </script>
