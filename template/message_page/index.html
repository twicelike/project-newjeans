            </svg>

        <input type="text" name="" id="searchInput" class="w-full outline-none rounded-full p-2 bg-slate-100 mb-4"

        <ul class="contact-list">

            </div>

              <div class="contact-name">User 1</div>

      </aside>
      <!-- End Sidebar Contact -->

      <!-- Main Chat Area -->
      <main id="mainChat" class="main-chat basis-6/12 border-r sm:flex flex-1 flex-col hidden relative">
        <div class="hidden chat-header flex justify-between items-center shadow-sm shadow-slate-200">
          <a href="#" class="inline-flex gap-2 items-center p-2 hover:bg-gray-100">
            <div class="contact-avatar w-[40px] h-[40px] rounded-full border-2 border-slate-500 overflow-hidden">
              <img src="assets/images/hanni.webp" alt="" class="w-full h-full object-cover">
            </div>
            <div class="contact-name"></div>
          </a>
        </div>
        <div class="hidden chat-container flex flex-col flex-1 p-4 border-b overflow-y-auto">
          <div class="message reveice-message relative max-w-[60%] my-[10px] p-4 rounded-[10px] bg-slate-200 self-start">
            <p class="content-message whitespace-pre-wrap"></p>
            <span class="time absolute text-[12px] text-black opacity-70 bottom-[-20px] left-[5px]">09:53</span>
          </div>
          <div class="message send-message relative max-w-[60%] my-[10px] p-4 rounded-[10px] bg-blue-300 self-end">
            <p class="content-message">Can you call me?</p>
            <span class="time absolute text-[12px] text-black opacity-70 bottom-[-20px] left-[5px]">10:00</span>
          </div>
        </div>
        <div class="hidden input-message flex items-center p-[10px] gap-2">
          <div id="createSurvey" class="create-survey cursor-pointer size-8 p-1 flex items-center justify-center">
            <i class="fa-solid fa-clipboard-list inline-block text-[#002275] text-2xl"></i>
          </div>
          <div class="upload-image cursor-pointer p-1">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="size-8 inline-block">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
            </svg>

          <textarea name="" id="messageInput" rows="1" class="flex-1 rounded-full resize-none p-2 px-4 outline-none bg-slate-100"
            autocomplete="off" placeholder="Aa"></textarea>
          <div class="send-message-input cursor-pointer hover:bg-slate-200 rounded-full p-2" id="sendButton">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
